global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: watchops-lite
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8080
  - job_name: watchops-demo
    static_configs:
      - targets:
          - demo-metrics:9108
